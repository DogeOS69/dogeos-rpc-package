services:
  dogecoin-node:
    image: dogeos69/dogecoin:1.14.9
    container_name: dogecoin-node
    restart: unless-stopped
    mem_reservation: ${DOGECOIN_MEM_RESERVATION:-14g}
    mem_limit: ${DOGECOIN_MEM_LIMIT:-20g}
    memswap_limit: ${DOGECOIN_MEM_LIMIT:-20g}
    oom_score_adj: -100
    volumes:
      - ./configs/${NETWORK}/dogecoin.conf:/home/dogecoin/.dogecoin/dogecoin.conf
      - dogecoin_data:/data
    ports:
      - "${DOGECOIN_P2P_PORT}:${DOGECOIN_P2P_PORT}"
      - "${DOGECOIN_RPC_PORT}:${DOGECOIN_RPC_PORT}"
    command: ["/dogecoin/bin/dogecoind", "-conf=/home/dogecoin/.dogecoin/dogecoin.conf", "-datadir=/data", "-printtoconsole"]

  l2geth-node:
    image: scrolltech/l2geth:scroll-v5.9.6
    profiles: ["l2geth"]
    container_name: l2geth-node
    restart: unless-stopped
    mem_reservation: 1g
    mem_limit: ${L2GETH_MEM_LIMIT:-8g}
    memswap_limit: ${L2GETH_MEM_LIMIT:-8g}
    oom_score_adj: -100
    env_file:
      - ./envs/common/l2geth.env
      - ./envs/${NETWORK}/l2geth.env
    volumes:
      - ./configs/${NETWORK}/l2geth-genesis.json:/l2geth/genesis/genesis.json
      - ./scripts/l2geth_entrypoint.sh:/entrypoint.sh
      - l2geth_data:/l2geth/data
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    depends_on:
      - l1-interface
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  l2reth-node:
    image: scrolltech/rollup-node:v0.0.1-rc63
    profiles: ["l2reth"]
    container_name: l2reth-node
    restart: unless-stopped
    mem_reservation: 1g
    mem_limit: ${L2RETH_MEM_LIMIT:-8g}
    memswap_limit: ${L2RETH_MEM_LIMIT:-8g}
    oom_score_adj: -100
    env_file:
      - ./envs/${NETWORK}/l2reth.env
    volumes:
      - ./configs/${NETWORK}/l2reth-genesis.json:/l2reth/genesis/genesis.json
      - ./scripts/l2reth_entrypoint.sh:/entrypoint.sh
      - l2reth_data:/l2reth
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    depends_on:
      - l1-interface
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  celestia-light-node:
    image: ghcr.io/celestiaorg/celestia-node:v0.30.2-mocha
    container_name: celestia-light-node
    restart: unless-stopped
    mem_reservation: 512m
    mem_limit: ${CELESTIA_MEM_LIMIT:-6g}
    memswap_limit: ${CELESTIA_MEM_LIMIT:-6g}
    oom_score_adj: -100
    env_file:
      - ./envs/${NETWORK}/celestia.env
    volumes:
      - ./scripts/celestia-entrypoint.sh:/entrypoint.sh
      - ./configs/${NETWORK}/celestia/config.toml:/etc/celestia/config.toml
      - celestia_data:/home/celestia
    ports:
      - "26658:26658"
      - "26659:26659"
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
  l1-interface:
    image: dogeos69/l1-interface:0.2.0-rc.7
    container_name: l1-interface
    restart: unless-stopped
    mem_reservation: 512m
    mem_limit: ${L1_INTERFACE_MEM_LIMIT:-2g}
    memswap_limit: ${L1_INTERFACE_MEM_LIMIT:-2g}
    oom_score_adj: -100
    env_file:
      - ./envs/common/l1-interface.env
      - ./envs/${NETWORK}/l1-interface.env
    volumes:
      - ./configs/${NETWORK}/l2geth-genesis.json:/app/genesis/genesis.json:ro
      - ./scripts/l1-interface-entrypoint.sh:/entrypoint.sh:ro
      - l1_interface_data:/data
    ports:
      - "8547:8545"
      - "5052:5052"
      - "9090:9090"
    depends_on:
      - dogecoin-node
      - celestia-light-node
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  dogecoin_data:
  l2geth_data:
  l2reth_data:
  celestia_data:
  l1_interface_data:
  
